<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Coraline - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --card-bg: rgba(21, 26, 45, 0.9);
            --primary-yellow: #facc15;
            --button-purple: #4c2d75;
            --text-gray: #94a3b8;
            --font-display: 'Creepster', cursive;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, #1a2236 0%, #05070a 100%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            color: white;
            font-family: 'Nunito', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 550px;
            z-index: 1;
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 {
            font-family: var(--font-display);
            color: var(--primary-yellow);
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 0 0 20px rgba(250, 204, 21, 0.4);
        }
        .subtitle { color: var(--text-gray); font-size: 0.9rem; letter-spacing: 2px; }

        .card-cadastro {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }

        .card-title {
            color: var(--primary-yellow);
            font-weight: 700;
            display: flex;
            align-items: center; gap: 12px;
            margin-bottom: 25px;
            text-transform: uppercase; font-size: 0.9rem;
        }

        .sew-button {
            width: 18px; height: 18px;
            background: var(--primary-yellow);
            border-radius: 50%;
            display: inline-grid; grid-template-columns: 1fr 1fr;
            padding: 3px; gap: 2px; box-shadow: inset 0 0 4px black;
        }
        .hole { background: black; border-radius: 50%; width: 4px; height: 4px; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 6px; color: var(--primary-yellow); opacity: 0.8; }
        
        input {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: white;
            box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--primary-yellow); background: rgba(0,0,0,0.5); outline: none; }

        .btn-main {
            width: 100%; border: none; padding: 15px; border-radius: 12px;
            font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }

        #btn-action { background: var(--primary-yellow); color: black; margin-top: 10px; }
        #btn-action:hover { filter: brightness(1.2); transform: translateY(-2px); }

        #btn-toggle-list {
            background: transparent; color: var(--primary-yellow);
            border: 1px solid var(--primary-yellow); margin-top: 15px;
            font-size: 0.75rem; padding: 10px; opacity: 0.7;
        }
        #btn-toggle-list:hover { opacity: 1; background: rgba(250, 204, 21, 0.1); }

     
        #secao-contatos {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .contatos-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
        }

        .contact-item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; border-radius: 15px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .contact-info strong { color: var(--primary-yellow); font-size: 1.1rem; }
        .contact-info p { margin: 5px 0 0 0; color: var(--text-gray); font-size: 0.85rem; }

        .actions { display: flex; gap: 10px; }
        .btn-edit { background: var(--button-purple); color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; }
        .btn-del { background: #450a0a; color: #ff4444; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; }
        
        .empty-msg { text-align: center; margin-top: 40px; color: var(--text-gray); opacity: 0.5; }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h1>Agenda Coraline</h1>
            <p class="subtitle">TURMA 30 — 2026</p>
        </header>

        <section class="card-cadastro">
            <div class="card-title">
                <div class="sew-button"><div class="hole"></div><div class="hole"></div><div class="hole"></div><div class="hole"></div></div>
                CADASTRAR VISITANTE
            </div>
            
            <input type="hidden" id="edit-index" value="-1">
            <div class="input-group">
                <label>NOME COMPLETO</label>
                <input type="text" id="nome" placeholder="Quem é você?">
            </div>
            <div class="input-group">
                <label>ENDEREÇO</label>
                <input type="text" id="endereco" placeholder="Onde você mora?">
            </div>
            <div class="input-group">
                <label>TELEFONE</label>
                <input type="text" id="telefone" placeholder="(00) 00000-0000">
            </div>
            
            <button id="btn-action" class="btn-main">Costurar Contato</button>
            <button id="btn-toggle-list" class="btn-main">Ver Cadastros Anteriores</button>
        </section>

        <section id="secao-contatos">
            <div class="contatos-header">
                <div style="display:flex; align-items:center; gap:10px; color:var(--primary-yellow); font-weight:bold;">
                    <div class="sew-button"><div class="hole"></div><div class="hole"></div><div class="hole"></div><div class="hole"></div></div>
                    CONTATOS SALVOS
                </div>
                <span id="contador" style="color: var(--text-gray); font-size: 0.8rem;">0 registros</span>
            </div>
            <div id="lista-contatos"></div>
        </section>
    </div>

    <script>
        const btnAction = document.getElementById('btn-action');
        const btnToggle = document.getElementById('btn-toggle-list');
        const secaoContatos = document.getElementById('secao-contatos');
        const lista = document.getElementById('lista-contatos');
        const contadorTxt = document.getElementById('contador');
        const editIndexInput = document.getElementById('edit-index');

        let contatos = JSON.parse(localStorage.getItem('coraline_v3')) || [];

        function renderizar() {
            lista.innerHTML = '';
            if (contatos.length === 0) {
                lista.innerHTML = '<div class="empty-msg"><p>Nenhuma memória encontrada...</p></div>';
                contadorTxt.innerText = '0 registros';
            } else {
                contatos.forEach((c, i) => {
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    div.innerHTML = `
                        <div class="contact-info">
                            <strong>${c.nome}</strong>
                            <p>${c.endereco} • ${c.telefone}</p>
                        </div>
                        <div class="actions">
                            <button class="btn-edit" onclick="prepararEdicao(${i})">Editar</button>
                            <button class="btn-del" onclick="remover(${i})">Excluir</button>
                        </div>
                    `;
                    lista.appendChild(div);
                });
                contadorTxt.innerText = `${contatos.length} registros`;
            }
            localStorage.setItem('coraline_v3', JSON.stringify(contatos));
        }

        btnToggle.onclick = () => {
            if (secaoContatos.style.display === 'block') {
                secaoContatos.style.display = 'none';
                btnToggle.innerText = 'Ver Cadastros Anteriores';
            } else {
                secaoContatos.style.display = 'block';
                btnToggle.innerText = 'Esconder Cadastros';
                renderizar();
            }
        };

        btnAction.onclick = () => {
            const nome = document.getElementById('nome').value;
            const endereco = document.getElementById('endereco').value;
            const telefone = document.getElementById('telefone').value;
            const idx = parseInt(editIndexInput.value);

            if(!nome || !endereco || !telefone) return alert("Preencha todos os campos!");

            if(idx === -1) {
                contatos.push({ nome, endereco, telefone });
            } else {
                contatos[idx] = { nome, endereco, telefone };
                editIndexInput.value = "-1";
                btnAction.innerText = "Costurar Contato";
            }

            limparCampos();
            renderizar();
            secaoContatos.style.display = 'block'; 
            btnToggle.innerText = 'Esconder Cadastros';
        };

        function prepararEdicao(i) {
            document.getElementById('nome').value = contatos[i].nome;
            document.getElementById('endereco').value = contatos[i].endereco;
            document.getElementById('telefone').value = contatos[i].telefone;
            editIndexInput.value = i;
            btnAction.innerText = "Atualizar Contato";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function remover(i) {
            if(confirm("Deseja apagar este contato?")) {
                contatos.splice(i, 1);
                renderizar();
            }
        }

        function limparCampos() {
            document.getElementById('nome').value = '';
            document.getElementById('endereco').value = '';
            document.getElementById('telefone').value = '';
        }

        renderizar();
    </script>
</body>
</html>
