<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoSport - Login do Árbitro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-start: #0f172a;
            --bg-end: #1e3a8a;
            --card-bg: rgba(255, 255, 255, 0.07);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end), var(--bg-start));
            background-size: 400% 400%;
            animation: gradientBg 15s ease infinite;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-card { 
            background: var(--card-bg); 
            border-radius: 24px; 
            padding: 40px 30px; 
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6), inset 0 1px 0px rgba(255, 255, 255, 0.15); 
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%; 
            max-width: 400px;
            text-align: center;
        }

        .logo-area h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 5px; color: white; }
        .logo-area span { color: #38bdf8; }
        .logo-area p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 35px; }

        h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; color: white; text-align: left; text-transform: uppercase; letter-spacing: 0.03em; }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        input { width: 100%; padding: 14px 16px; border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; font-size: 0.95rem; background-color: var(--input-bg); color: white; outline: none; transition: all 0.3s; }
        input:focus { border-color: #60a5fa; background: rgba(15, 23, 42, 0.8); box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15); }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; background-color: var(--primary); color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .btn:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <h1>Info<span>Sport</span></h1>
            <p>Painel de Arbitragem Escolar</p>
        </div>

        <div class="form-group">
            <h3>🔐 Acesso do Árbitro</h3>
            <label for="chaveArbitro">Chave de Segurança</label>
            <input type="password" id="chaveArbitro" placeholder="Digite a chave do organizador">
        </div>

        <button class="btn" onclick="entrarComoArbitro()">Entrar no Painel 🛠️</button>
    </div>

    <script>
        function entrarComoArbitro() {
            const chave = document.getElementById('chaveArbitro').value.trim();
            
            
            if (chave === 'admin' || chave === '1234') {
                window.location.href = "jogo.html?modo=arbitro";
            } else if (chave === "") {
                alert("Por favor, digite a chave de acesso.");
            } else {
                alert("Chave de acesso incorreta!");
            }
        }

        
        document.getElementById('chaveArbitro').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') entrarComoArbitro();
        });
    </script>
</body>
</html>
