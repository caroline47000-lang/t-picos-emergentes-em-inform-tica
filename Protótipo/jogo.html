<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoSport - Partida</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 750px; display: grid; gap: 25px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid rgba(0, 0, 0, 0.03); }
        h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 0.95rem; outline: none; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .modalidade-tag { text-align: center; font-size: 1rem; font-weight: 700; text-transform: uppercase; color: var(--primary); letter-spacing: 0.05em; margin-bottom: 15px; }
        .placar-container { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border: 1px solid var(--border); border-radius: 16px; padding: 25px 40px; }
        .time-box { flex: 1; text-align: center; }
        .time-box h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 12px; }
        .pontos-display { font-size: 4.5rem; font-weight: 800; color: var(--primary); background: white; width: 140px; height: 100px; display: flex; align-items: center; justify-content: center; margin: 0 auto; border-radius: 14px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .vs { font-size: 1.1rem; font-weight: 700; color: var(--text-muted); padding: 0 20px; }
        .controle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .col-controle { background: #f8fafc; border: 1px solid var(--border); padding: 20px; border-radius: 16px; text-align: center; }
        .col-controle h4 { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 15px; font-weight: 600; }
        .btn { width: 100%; padding: 12px; margin: 6px 0; border: none; border-radius: 10px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-add { background-color: var(--success); color: white; }
        .btn-sub { background-color: var(--danger); color: white; }
        .btn-reset { background-color: #475569; color: white; margin-top: 15px; }
        .qrcode-box { margin-top: 20px; padding: 20px; background: #f8fafc; border: 2px dashed var(--border); border-radius: 14px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        #qrcodeImgContainer { padding: 10px; background: white; border-radius: 10px; }
        .codigo-sala-destaque { font-size: 1.3rem; font-weight: 800; color: var(--primary); background: #eff6ff; padding: 8px 16px; border-radius: 8px; border: 1px solid #bfdbfe; letter-spacing: 1px; }
        .hidden { display: none !important; }
        @media (max-width: 600px) { .placar-container { flex-direction: column; gap: 20px; } .controle-grid { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        
        <main id="telaSetup" class="card hidden">
            <h2>⚙️ Configuração da Nova Partida (Árbitro)</h2>
            <div class="form-group">
                <label for="inputModalidade">Modalidade Esportiva</label>
                <input type="text" id="inputModalidade" placeholder="Ex: Futsal Masculino">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="inputTimeA">Nome do Time A (Casa)</label>
                    <input type="text" id="inputTimeA" placeholder="Ex: Informática 3º Ano">
                </div>
                <div class="form-group">
                    <label for="inputTimeB">Nome do Time B (Visitante)</label>
                    <input type="text" id="inputTimeB" placeholder="Ex: Mecânica 2º Ano">
                </div>
            </div>
            <button class="btn btn-primary" onclick="inicializarPartida()">🚀 Iniciar Partida e Ativar Painel</button>
        </main>

        <div id="telaPlacar" class="container hidden">
            <main class="card">
                <h2 id="tituloPlacar">📺 Placar em Tempo Real</h2>
                <div id="modalidadeDisplay" class="modalidade-tag">Carregando partida...</div>
                <div class="placar-container">
                    <div class="time-box">
                        <h3 id="nomeTimeADisplay">---</h3>
                        <div id="displayA" class="pontos-display">0</div>
                    </div>
                    <div class="vs">X</div>
                    <div class="time-box">
                        <h3 id="nomeTimeBDisplay">---</h3>
                        <div id="displayB" class="pontos-display">0</div>
                    </div>
                </div>
            </main>

            <section id="painelControle" class="card hidden">
                <h2>🎛️ Controle do Placar</h2>
                <div class="controle-grid">
                    <div class="col-controle">
                        <h4>Pontos Time A</h4>
                        <button class="btn btn-add" onclick="enviarPontos('A', 1)">+ 1</button>
                        <button class="btn btn-sub" onclick="enviarPontos('A', -1)">- 1</button>
                    </div>
                    <div class="col-controle">
                        <h4>Pontos Time B</h4>
                        <button class="btn btn-add" onclick="enviarPontos('B', 1)">+ 1</button>
                        <button class="btn btn-sub" onclick="enviarPontos('B', -1)">- 1</button>
                    </div>
                </div>
                <button class="btn btn-reset" onclick="finalizarPartida()">🔄 Encerrar Partida Completamente</button>
            </section>

            <section id="areaCompartilhar" class="card hidden">
                <h2>📱 Compartilhar com os Alunos</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 12px;">
                    Informe aos alunos o código abaixo ou peça para escanearem o QR Code para assistir:
                </p>
                <div class="qrcode-box">
                    <div id="salaCodigoDisplay" class="codigo-sala-destaque">------</div>
                    <div id="qrcodeImgContainer"></div>
                </div>
            </section>
        </div>
    </div>

    <script>
        let pontosTimeA = 0;
        let pontosTimeB = 0;
        let canalAbly;
        let salaId = "";

        const ABLY_KEY = "O94vOA.ELR57w:ikfHvNhNbsH7N3DVDkwSsG5zlE33TuF-DL4B6Z8d8Ho";
        const ably = new Ably.Realtime(ABLY_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const modo = urlParams.get('modo');
        const salaParam = urlParams.get('sala');

       
        if (modo === 'arbitro' && !salaParam) {
           
            document.getElementById('telaSetup').classList.remove('hidden');
        } else if (salaParam) {
           
            salaId = salaParam;
            conectarAoCanal();
        }

        function inicializarPartida() {
            salaId = "jogo_" + Math.floor(10000 + Math.random() * 90000);
            conectarAoCanal();

            const mod = document.getElementById('inputModalidade').value.trim() || "Competição";
            const timeA = document.getElementById('inputTimeA').value.trim() || "Time A";
            const timeB = document.getElementById('inputTimeB').value.trim() || "Time B";

            document.getElementById('modalidadeDisplay').textContent = mod;
            document.getElementById('nomeTimeADisplay').textContent = timeA;
            document.getElementById('nomeTimeBDisplay').textContent = timeB;

            setTimeout(() => {
                canalAbly.publish('atualizacao', { modalidade: mod, timeA: timeA, timeB: timeB, pA: 0, pB: 0 });
            }, 600);
        }

        function conectarAoCanal() {
            canalAbly = ably.channels.get(salaId);
            
            document.getElementById('telaSetup').classList.add('hidden');
            document.getElementById('telaPlacar').classList.remove('hidden');

            if (modo === 'arbitro') {
                document.getElementById('painelControle').classList.remove('hidden');
                document.getElementById('areaCompartilhar').classList.remove('hidden');
                document.getElementById('salaCodigoDisplay').textContent = salaId;
                document.getElementById('tituloPlacar').textContent = "🎛️ Painel Geral do Árbitro";

               
                const linkAlunos = `https://caroline47000-lang.github.io/t-picos-emergentes-em-inform-tica/jogo.html?sala=${salaId}&modo=publico`;
                document.getElementById('qrcodeImgContainer').innerHTML = "";
                new QRCode(document.getElementById('qrcodeImgContainer'), {
                    text: linkAlunos,
                    width: 160,
                    height: 160
                });
            } else {
                document.getElementById('tituloPlacar').textContent = "📢 Tela de Visualização dos Alunos";
            }

           
            canalAbly.subscribe('atualizacao', (msg) => {
                const dados = msg.data;
                document.getElementById('modalidadeDisplay').textContent = dados.modalidade;
                document.getElementById('nomeTimeADisplay').textContent = dados.timeA;
                document.getElementById('nomeTimeBDisplay').textContent = dados.timeB;
                document.getElementById('displayA').textContent = dados.pA;
                document.getElementById('displayB').textContent = dados.pB;
                pontosTimeA = dados.pA;
                pontosTimeB = dados.pB;
            });

           
            canalAbly.subscribe('encerrar', () => {
                alert("A partida foi encerrada pelo árbitro.");
                window.location.href = 'index.html';
            });
        }

        function enviarPontos(time, valor) {
            const mod = document.getElementById('modalidadeDisplay').textContent;
            const tA = document.getElementById('nomeTimeADisplay').textContent;
            const tB = document.getElementById('nomeTimeBDisplay').textContent;

            if (time === 'A') pontosTimeA = Math.max(0, pontosTimeA + valor);
            if (time === 'B') pontosTimeB = Math.max(0, pontosTimeB + valor);

            canalAbly.publish('atualizacao', {
                modalidade: mod, timeA: tA, timeB: tB, pA: pontosTimeA, pB: pontosTimeB
            });
        }

        function finalizarPartida() {
            if (confirm("Tem certeza que deseja encerrar definitivamente esta partida?")) {
                canalAbly.publish('encerrar', {});
                setTimeout(() => { window.location.href = 'index.html'; }, 500);
            }
        }
    </script>
</body>
</html>
