<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Cliques ⚡</title>
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #2c000a 0%, #800020 100%);
            color: white;
            overflow: hidden;
        }

      
        @keyframes flutuar {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            animation: flutuar 6s ease-in-out infinite;
        }

        h1 { font-size: 1.5rem; opacity: 0.8; margin-bottom: 5px; }

       
        #contadorDisplay {
            font-size: 5rem;
            font-weight: 900;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            display: block;
        }

        button {
            background: white;
            color: #800020;
            border: none;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        .reset-link {
            display: block;
            margin-top: 20px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Cliques Acumulados</h1>
        
        <div id="contadorDisplay">0</div>

        <button onclick="contar()">CLICAR AQUI 👆</button>

        <a class="reset-link" onclick="resetar()">Zerar contador 🔄</a>
    </div>

    <script>
    
        let numeroDeCliques = 0;

        function contar() {
            
            numeroDeCliques = numeroDeCliques + 1;

           
            const display = document.getElementById('contadorDisplay');

            
            display.innerText = numeroDeCliques;

       
            display.style.transform = "scale(1.2)";
            setTimeout(() => { display.style.transform = "scale(1)"; }, 100);
        }

        function resetar() {
            numeroDeCliques = 0;
            document.getElementById('contadorDisplay').innerText = 0;
        }
    </script>

</body>
</html>
